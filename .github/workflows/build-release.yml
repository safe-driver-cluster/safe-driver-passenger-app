name: Build Release APK & AAB

on:
  push:
    branches:
      - qa

jobs:
  build-release:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.1'
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release AAB
        run: flutter build appbundle --release

      - name: Prepare APK for upload
        id: apk-prep
        run: |
          APK_FILE=$(find . -name "*.apk" -path "*/build/app/outputs/flutter-apk/*.apk" | head -n 1)
          
          if [ -z "$APK_FILE" ]; then
            echo "No APK file found"
            exit 1
          fi
          
          mkdir -p artifacts
          cp "$APK_FILE" artifacts/
          APK_NAME=$(basename "$APK_FILE")
          
          echo "apk_path=artifacts/$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Prepare AAB for upload
        id: aab-prep
        run: |
          AAB_FILE=$(find . -name "*.aab" -path "*/build/app/outputs/bundle/release/*.aab" | head -n 1)
          
          if [ -z "$AAB_FILE" ]; then
            echo "No AAB file found"
            exit 1
          fi
          
          mkdir -p artifacts
          cp "$AAB_FILE" artifacts/
          AAB_NAME=$(basename "$AAB_FILE")
          
          echo "aab_path=artifacts/$AAB_NAME" >> $GITHUB_OUTPUT
          echo "aab_name=$AAB_NAME" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.sha }}
          path: ${{ steps.apk-prep.outputs.apk_path }}
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.sha }}
          path: ${{ steps.aab-prep.outputs.aab_path }}
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** ${{ steps.apk-prep.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**AAB:** ${{ steps.aab-prep.outputs.aab_name }}" >> $GITHUB_STEP_SUMMARY
